version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      microsoft-packages:
        patterns:
          - "Microsoft.*"
          - "Asp.Versioning.*"
      test-packages:
        patterns:
          - "Moq"
          - "MockQueryable.Moq"
          - "Shouldly"
          - "xunit.*"
          - "Microsoft.NET.Test.Sdk"
          - "DotNet.Testcontainers"
          - "Testcontainers.*"
      graphql-packages:
        patterns:
          - "HotChocolate.*"
      logging-packages:
        patterns:
          - "Serilog.*"
      infrastructure-packages:
        patterns:
          - "MongoDB.*"
          - "Npgsql.*"
          - "Keycloak.*"
          - "Kot.MongoDB.Migrations*"
          - "AspNetCore.HealthChecks.*"
      other-packages:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/APITemplate.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/ProductCatalog/ProductCatalog.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/Reviews/Reviews.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/Identity/Identity.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/Notifications/Notifications.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/FileStorage/FileStorage.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/BackgroundJobs/BackgroundJobs.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Services/Webhooks/Webhooks.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/src/Gateway/Gateway.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
